<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Bootstrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="estilos.css" />
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="index.html"
          ><i class="bi bi-discord"></i
        ></a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" aria-current="page" href="index.html"
                >Home</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="sobre.html">Sobre</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="contato.html">Contato</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <!--Nome do produto-->
    <div class="container mt-3">
      <h3>Contato</h3>
      <form class="row g-3">
        <div class="col-md-6 col-sm-12">
          <div class="form-floating">
            <input type="text" name="nome" id="nome" class="form-control" placeholder="Nome Completo" required>
            <label for="nome">Nome do Produto</label>
          </div>
        </div>
        <!--Valor do produto-->
        <div class="col-md-6 col-sm-12">
          <div class="form-floating">
            <input type="number" name="valor" id="valor" class="form-control" placeholder="Valor do Produto" step="0.5" required>
            <label for="valor">Valor do Produto</label>
          </div>
        </div>
        <!--Quantidade de produtos-->
        <div class="col-md-4 col-sm-12">
          <div class="form-floating">
            <input type="number" name="quantidade" id="quantidade" class="form-control" placeholder="Quantidade" required>
            <label for="senha">Quantidade</label>
          </div>
        </div>
        <!--Data de nascimento
        <div class="col-md-4 col-sm-12">
          <div class="form-floating">
            <input type="date" name="data" id="data" class="form-control">
            <label for="data">Data de nascimento</label>
          </div>
        </div>-->
        <!--Menu de opções-->
        <div class="col-md-4 col-sm-12">
          <div class="form-floating">
            <select name="produtos" id="produtos" class="form-select" required>
              <option value="" selected disabled>Selecione</option>
              <option value="mouse">Mouse</option>
              <option value="teclado">Teclado</option>
              <option value="monitor">Monitor</option>
              <option value="notebook">Notebook</option>
              <option value="mousepad">Mousepad</option>
              <option value="carregador">Carregador</option>
            </select>
            <label for="produtos">Produtos</label>
          </div>
        </div>
        <!--caixas de rádio-->
        <div class="col-12">
          <label class="form-label d-block">Fabricado em</label>
          <div class="form-check form-check-inline">
            <input type="radio" name="tipo" id="sp" class="form-check-input">
            <label for="sp" class="form-check-label">SP</label>
          </div>
          <div class="form-check form-check-inline">
            <input type="radio" name="tipo" id="rj" class="form-check-input">
            <label for="rj" class="form-check-label">RJ</label>
          </div>
          <div class="form-check form-check-inline">
            <input type="radio" name="tipo" id="mg" class="form-check-input">
            <label for="mg" class="form-check-label">MG</label>
          </div>
        </div>
        <!--Caixa para aceitar os termos-->
        <div class="col-md-12 col-sm-12">
          <div class="form-check">
            <input type="checkbox" name="termos" id="termos" class="form-check-input" required>
            <label for="termos" class="form-check-label">
              Aceite os Termos
            </label>
          </div>
        </div>
        <!--Botões-->
        <div class="col-12 mb-4">
          <button type="button" class="btn btn-danger">Cancelar</button>
          <button type="reset" class="btn btn-primary">Limpar</button>
          <button type="submit" class="btn btn-success">Enviar</button>
        </div>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
